<!-- Main Content Area -->

<!-- Canvas -->

<!-- Inventory Header & Search -->
<div class="max-w-full w-full space-y-6 mb-8">
<div class="flex justify-between items-end">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Inventory</h2>
<p class="text-on-surface-variant text-sm mt-1">Manage and track laboratory reagents and supplies</p>
</div>
<button id="add-item" class="bg-primary px-6 py-2 text-on-primary font-bold rounded-lg flex items-center gap-2 hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                Add Item
            </button>
</div>
<!-- Search Bar (Voice & Text) -->
<section class="glass-panel p-4 rounded-xl flex flex-col md:flex-row items-center gap-4">
<div class="relative flex-1 group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">search</span>
<input aria-label="Search inventory" class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg py-3 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant outline-none transition-all" placeholder="Search inventory..." type="text">
</div>
</section>
</div>
<!-- Flat Table Content -->
<div class="flex-1 min-h-0 overflow-hidden">
<div class="glass-panel rounded-2xl overflow-hidden flex flex-col h-full">
<div class="bg-surface-container-high px-6 py-4 flex justify-between items-center border-b border-outline-variant">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="inventory_2">inventory_2</span>
<span class="font-bold text-on-surface">Lab Inventory</span>
</div>
</div>
<div id="inventory-rows" class="flex-1 overflow-y-auto custom-scrollbar">
<div class="p-12 text-center text-on-surface-variant text-sm">Loading inventory…</div>
</div>
</div>
</div>
</div>
<!-- Voice Assistant Bubble -->
<div id="voice-dock" class="fixed bottom-8 right-8 z-50 w-80 max-w-[90vw] flex flex-col gap-2 items-end">
<div id="live-transcript" class="hidden w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 shadow-xl text-sm text-on-surface max-h-40 overflow-y-auto" aria-live="polite"></div>
<div class="flex items-center gap-2 bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 shadow-xl">
<button id="voice-mute" type="button" disabled aria-pressed="false" title="Mute" class="relative w-8 h-8 flex items-center justify-center shrink-0 rounded-full hover:opacity-80 transition-opacity disabled:opacity-40">
<span id="voice-pulse" class="absolute inset-0 rounded-full border border-secondary opacity-0"></span>
<span id="voice-mic" class="material-symbols-outlined voice-mic-off" style="font-size:16px">mic</span>
</button>
<button id="voice-toggle" type="button" aria-pressed="false" title="Start voice session" class="flex flex-col items-start hover:opacity-80 transition-opacity">
<span id="voice-status" class="text-[9px] font-bold text-secondary uppercase tracking-[0.2em] leading-none">Voice off</span>
<span class="text-xs text-on-surface-variant">Voice Assistant</span>
</button>
</div>
</div>
</main>
<script>
    // Search filters the table: matches collapse to the top, non-matches are
    // hidden (not just dimmed). Re-queries .inventory-row each keystroke so it
    // keeps working after app.js re-renders the rows from /api/inventory.
    const searchInput = document.querySelector('input[type="text"]');
    searchInput.addEventListener('input', (e) => {
        const rows = document.querySelectorAll('.inventory-row');
        const term = e.target.value.toLowerCase().trim();

        rows.forEach(row => {
            const match = !term || row.innerText.toLowerCase().includes(term);
            row.style.display = match ? '' : 'none';
            row.style.opacity = '1';
        });
    });
</script>






<!-- Add Item Modal -->
<div id="additem-modal" class="hidden fixed inset-0 z-[60] bg-black/60 flex items-center justify-center p-4">
  <div class="bg-surface-container-high border border-outline-variant rounded-2xl w-full max-w-lg p-6 shadow-2xl">
    <div class="flex justify-between items-center mb-4">
      <h3 id="additem-title" class="font-headline-md text-headline-md">Add Inventory Item</h3>
      <button id="additem-cancel" class="text-on-surface-variant hover:text-on-surface" aria-label="Close"><span class="material-symbols-outlined">close</span></button>
    </div>
    <label class="block text-xs font-bold uppercase text-on-surface-variant mb-1" for="additem-name">Reagent</label>
    <input id="additem-name" type="text" class="w-full mb-4 bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-on-surface" placeholder="e.g. Proteinase K" />
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-bold uppercase text-on-surface-variant mb-1" for="additem-amount">Amount</label>
        <input id="additem-amount" type="text" inputmode="decimal" class="w-full mb-4 bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-on-surface" placeholder="e.g. 500" />
      </div>
      <div>
        <label class="block text-xs font-bold uppercase text-on-surface-variant mb-1" for="additem-unit">Unit</label>
        <input id="additem-unit" type="text" list="additem-unit-options" class="w-full mb-4 bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-on-surface" placeholder="e.g. mL" />
        <datalist id="additem-unit-options"></datalist>
      </div>
    </div>
    <label class="block text-xs font-bold uppercase text-on-surface-variant mb-1" for="additem-location">Location</label>
    <input id="additem-location" type="text" class="w-full mb-4 bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-on-surface" placeholder="e.g. Freezer 2 shelf B" />
    <label class="block text-xs font-bold uppercase text-on-surface-variant mb-1" for="additem-date">Date Created</label>
    <input id="additem-date" type="date" class="w-full mb-4 bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-on-surface" />
    <div id="additem-result" aria-live="polite" class="text-sm mb-4 min-h-[1.25rem]"></div>
    <div class="flex justify-end gap-3">
      <button id="additem-cancel-2" class="px-4 py-2 rounded-lg border border-outline text-on-surface hover:bg-surface-variant">Cancel</button>
      <button id="additem-submit" class="px-4 py-2 rounded-lg bg-primary text-on-primary font-bold hover:bg-primary/90">Add Item</button>
    </div>
  </div>

<button id="demo-reset" data-action="demo-reset" type="button" class="fixed bottom-6 left-72 z-50 inline-flex items-center gap-2 bg-surface-container-high border border-outline-variant text-on-surface px-4 py-2 rounded-full shadow-lg hover:bg-surface-variant transition-all"><span class="material-symbols-outlined">restart_alt</span><span>Reset Demo</span></button>
