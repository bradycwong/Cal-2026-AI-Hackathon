protocol:
  id: bacterial_transformation
  name: Bacterial Transformation
  version: '1.0'
  description: Heat-shock transformation of competent E. coli with plasmid DNA.
  category: Microbiology
  status: READY
  aliases:
  - bacterial transformation protocol
  - bacterial transformation
  - transformation
  - heat shock transformation
  steps:
  - id: 1
    text: Thaw competent cells on ice for 10 minutes.
    duration_s: 600
    parameters:
      temp_c: 0
    timer_label: thaw on ice
  - id: 2
    text: "Add 2 \xB5L plasmid DNA to 50 \xB5L competent cells and flick to mix."
    duration_s: null
    parameters:
      volume_ul: 2
      reagent: plasmid DNA
  - id: 3
    text: "Heat shock at 42 \xB0C for 45 seconds, then return to ice for 2 minutes."
    duration_s: 45
    parameters:
      temp_c: 42
    timer_label: heat shock
  - id: 4
    text: "Add 950 \xB5L SOC medium and recover at 37 \xB0C shaking for 1 hour."
    duration_s: 3600
    parameters:
      volume_ul: 950
      reagent: SOC medium
      temp_c: 37
    timer_label: recovery
  - id: 5
    text: "Plate 100 \xB5L on LB agar with antibiotic and incubate overnight at 37\
      \ \xB0C."
    duration_s: null
    parameters:
      volume_ul: 100
      reagent: LB agar
      temp_c: 37
  - id: 6
    text: sit arund doing nothing
    duration_s: 60000
    parameters: {}
